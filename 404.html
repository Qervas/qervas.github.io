<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>404 · Shaoxuan (Frank) Yin</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark')
          t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <style>
    :root, [data-theme="light"] {
      --paper: #fffdf9; --ink: #171412; --muted: #645d55; --accent: #9b4123;
      --rule: #ddd4c8; --bg-top: #f8f4ed; --bg-bot: #ebe3d6;
    }
    [data-theme="dark"] {
      --paper: #1a1714; --ink: #f0e9e0; --muted: #a89f93; --accent: #d4784f;
      --rule: #322c26; --bg-top: #141210; --bg-bot: #0c0a09;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bot));
      padding: 24px;
    }
    .card {
      width: min(440px, 100%);
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 40px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.1);
    }
    .code {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    h1 {
      font-family: Newsreader, Georgia, serif;
      font-size: 2rem;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }
    p { color: var(--muted); line-height: 1.6; font-size: 0.95rem; margin-bottom: 22px; }
    a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }
    a:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <main class="card">
    <p class="code">404 · not found</p>
    <h1>This path doesn’t render.</h1>
    <p>The page you asked for isn’t on this site. Head back to the portfolio — engines, neural rendering, agents, and the rest.</p>
    <a href="/">← qervas.github.io</a>
  </main>
</body>
</html>
